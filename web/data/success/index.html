<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Ready | Daily AI Toll</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1A1A18;
            --surface: #232321;
            --border: #333;
            --text: #F1EFE8;
            --muted: #888780;
            --dim: #555;
            --toll-red: #A32D2D;
            --toll-red-dark: #E24B4A;
            /* Legacy aliases */
            --ink: #1A1A18;
            --slate: #888780;
            --ash: #F1EFE8;
        }

        :root.light {
            --bg: #f5f3ee;
            --surface: #edeae4;
            --border: rgba(0,0,0,0.12);
            --text: #1a1916;
            --muted: #6a6860;
            --dim: #a09c94;
            --toll-red: #8B2525;
            --toll-red-dark: #C03030;
            --ink: #f5f3ee;
            --slate: #6a6860;
            --ash: #1a1916;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 4rem 2rem;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
        }

        nav a:hover {
            color: var(--text);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text);
        }

        .nav-brand svg {
            width: 20px;
            height: 20px;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .theme-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 0.25rem;
            display: flex;
            align-items: center;
        }

        .theme-btn:hover {
            color: var(--text);
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--ash);
            margin-bottom: 1rem;
        }

        .message {
            color: var(--slate);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            padding: 1rem 2rem;
            border-radius: 4px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--toll-red-dark);
            color: var(--ink);
            border: none;
            margin-bottom: 1.5rem;
        }

        .btn:hover {
            background: #f25d5c;
        }

        .stats {
            font-size: 0.8125rem;
            color: var(--slate);
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--surface);
            border-radius: 4px;
        }

        .note {
            font-size: 0.75rem;
            color: var(--dim);
            margin-top: 2rem;
        }

        footer {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        footer a {
            color: var(--slate);
            text-decoration: none;
            font-size: 0.75rem;
            margin: 0 1rem;
        }

        footer a:hover {
            color: var(--ash);
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="/" class="nav-brand">
                <svg viewBox="0 0 32 32" fill="currentColor">
                    <rect x="4" y="4" width="6" height="24" rx="1"/>
                    <rect x="13" y="12" width="6" height="16" rx="1"/>
                    <rect x="22" y="18" width="6" height="10" rx="1"/>
                </svg>
                Daily AI Toll
            </a>
            <div class="nav-links">
                <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="4"/>
                        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                    </svg>
                </button>
                <a href="/data/">Data</a>
                <a href="/methodology/">Methodology</a>
                <a href="https://www.linkedin.com/company/dailyaitoll" class="nav-linkedin" title="LinkedIn"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg></a>
            </div>
        </nav>

        <div class="success-icon">&#10003;</div>
        <h1>Thank you for your purchase</h1>
        <p class="message">Your download is ready. Click below to get your CSV file.</p>

        <button class="btn" id="download-btn">Download CSV</button>

        <div class="stats">
            <span id="event-count">—</span> events · <span id="job-count">—</span> jobs · Updated <span id="last-updated">—</span>
        </div>

        <p class="note">
            This link is valid for this session only. Bookmark this page or save your CSV file.<br>
            Questions? Contact data@dailyaitoll.com
        </p>

        <footer>
            <a href="/">Home</a>
            <a href="/data/">Data</a>
            <a href="mailto:data@dailyaitoll.com">Contact</a>
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('/data/daily_rollup.json');
                if (response.ok) {
                    const data = await response.json();
                    render(data);
                }
            } catch (e) {
                console.log('Data not available');
            }
        }

        function render(data) {
            document.getElementById('event-count').textContent = data.events_count || 0;
            document.getElementById('job-count').textContent =
                (data.totals?.jobs || 0).toLocaleString();

            if (data.last_updated) {
                const date = new Date(data.last_updated);
                document.getElementById('last-updated').textContent =
                    date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            }

            const events = data.all_events || [];

            document.getElementById('download-btn').addEventListener('click', () => {
                downloadCSV(events);
            });
        }

        function downloadCSV(events) {
            const headers = ['event_date', 'company', 'jobs', 'headline', 'excerpt', 'source_name', 'source_url', 'causality', 'confidence'];

            const rows = events.map(e => {
                const company = e.headline?.split(' ')[0] || '';
                return [
                    e.event_date || '',
                    company,
                    e.tolls?.jobs || 0,
                    `"${(e.headline || '').replace(/"/g, '""')}"`,
                    `"${(e.excerpt || '').replace(/"/g, '""')}"`,
                    e.source_name || '',
                    e.source_url || '',
                    e.causality || '',
                    e.confidence || ''
                ].join(',');
            });

            const csv = headers.join(',') + '\n' + rows.join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = `daily-ai-toll-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();

            URL.revokeObjectURL(url);
        }

        loadData();

        // Theme toggle
        function toggleTheme() {
            document.documentElement.classList.toggle('light');
            localStorage.setItem('theme', document.documentElement.classList.contains('light') ? 'light' : 'dark');
        }
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light');
        }
    </script>
</body>
</html>
