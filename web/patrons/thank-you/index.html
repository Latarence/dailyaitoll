<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Daily AI Toll</title>
    <meta name="description" content="Thank you for supporting Daily AI Toll.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1A1A18;
            --surface: #232321;
            --border: #333;
            --text: #F1EFE8;
            --muted: #888780;
            --dim: #555;
            --toll-red: #A32D2D;
            --toll-red-dark: #E24B4A;
        }

        :root.light {
            --bg: #f5f3ee;
            --surface: #edeae4;
            --border: rgba(0,0,0,0.12);
            --text: #1a1916;
            --muted: #6a6860;
            --dim: #a09c94;
            --toll-red: #8B2525;
            --toll-red-dark: #C03030;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.7;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 4rem 2rem;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
        }

        nav a:hover {
            color: var(--text);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text);
        }

        .nav-brand svg {
            width: 20px;
            height: 20px;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .theme-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 0.25rem;
            display: flex;
            align-items: center;
        }

        .theme-btn:hover {
            color: var(--text);
        }

        .icon {
            width: 64px;
            height: 64px;
            margin: 2rem auto;
            color: var(--toll-red-dark);
        }

        h1 {
            font-family: 'Inter', sans-serif;
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .message {
            font-size: 0.9375rem;
            color: var(--muted);
            max-width: 480px;
            margin: 0 auto 2rem;
        }

        .btn {
            display: inline-block;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.875rem 2rem;
            border-radius: 4px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn:hover {
            border-color: var(--muted);
        }

        footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            font-size: 0.75rem;
        }

        .footer-links a {
            color: var(--muted);
            text-decoration: none;
        }

        .footer-links a:hover {
            color: var(--text);
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="/" class="nav-brand">
                <svg viewBox="0 0 32 32" fill="currentColor">
                    <rect x="4" y="4" width="6" height="24" rx="1"/>
                    <rect x="13" y="12" width="6" height="16" rx="1"/>
                    <rect x="22" y="18" width="6" height="10" rx="1"/>
                </svg>
                Daily AI Toll
            </a>
            <div class="nav-links">
                <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="4"/>
                        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                    </svg>
                </button>
                <a href="/">Home</a>
            </div>
        </nav>

        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 12l2.5 2.5L16 9"/>
        </svg>

        <h1>Thank You</h1>
        <p class="message">
            Your support helps keep Daily AI Toll running. Your name will appear on the patrons page shortly.
        </p>

        <a href="/" class="btn">Return Home</a>

        <footer>
            <div class="footer-links">
                <a href="/">Home</a>
                <a href="/about/">About</a>
                <a href="/patrons/">Patrons</a>
            </div>
        </footer>
    </div>

    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('light');
            localStorage.setItem('theme', document.documentElement.classList.contains('light') ? 'light' : 'dark');
        }
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light');
        }
    </script>
</body>
</html>
