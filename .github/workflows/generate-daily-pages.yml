name: Generate Daily Pages

on:
  # Trigger after daily toll collection completes successfully
  workflow_run:
    workflows: ["Daily AI Toll"]
    types:
      - completed
    branches:
      - main
  # Backup: trigger on data file changes (for manual updates)
  push:
    paths:
      - 'data/events.jsonl'
      - 'data/daily_rollup.json'
      - 'scripts/templates/daily_page.html'
      - 'scripts/generate_daily_pages.py'
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    # Only run if triggered by workflow_dispatch, push, or if the triggering workflow succeeded
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # For workflow_run, fetch the latest commit from main to get updated data
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate daily pages
        run: python scripts/generate_daily_pages.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet web/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/
          git commit -m "chore: regenerate daily pages [skip ci]"
          git push
