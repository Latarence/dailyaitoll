name: Daily AI Toll

on:
  schedule:
    - cron: '55 3 * * *'  # 11:55 PM EDT (03:55 UTC) - report ready by midnight
  workflow_dispatch:
    inputs:
      create_pr:
        description: 'Create PR instead of direct commit'
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [collect-toll]

jobs:
  collect-toll:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run toll collection
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_toll.py

      - name: Commit and push
        if: ${{ github.event.inputs.create_pr != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "toll: $(date +'%Y-%m-%d') update"
          git push

      - name: Create PR (manual only)
        if: ${{ github.event.inputs.create_pr == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "toll: $(date +'%Y-%m-%d') update"
          title: "Daily AI Toll - $(date +'%Y-%m-%d')"
          body: "Manual review requested."
          branch: toll/review-${{ github.run_number }}
          delete-branch: true
